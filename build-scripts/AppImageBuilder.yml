version: 1


script:
  # Remove any previous build
  # Make usr and icons dirs
  - mkdir -p AppDir/usr/src
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  # Copy the python application code into the AppDir
  - cp -a ./src AppDir/usr -r
  - cp widget_logo.png AppDir/usr/share/icons/hicolor/256x256/apps -r
  - apt-get update && apt-get install -y --no-install-recommends squashfs-tools python3
  
  
AppDir:
  path: ./AppDir
  app_info:
    id: KeychronBatteryWidget
    name: KeychronBatteryWidget
    icon: widget_logo
    version: "1.0"
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/src/keychron_widget.py $@"

  apt:
    arch: amd64
    sources:
    allow_unauthenticated: true
    sources:
      - sourceline: deb http://mx.archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
      - sourceline: deb http://mx.archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
      - sourceline: deb http://mx.archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
      - sourceline: deb http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse

    include:
      - python3
      - python3-pkg-resources
      - python3-idna 
      - libfreetype6
      - libfontconfig1
      - bash
      - coreutils      
      - libhidapi-hidraw0
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
      - libpcre3

  runtime:
    env:
      PATH: '${APPDIR}/usr/bin:${PATH}'
      PYTHONHOME: '${APPDIR}/usr'
      PYTHONPATH: '${APPDIR}/usr/lib/python3.10/site-packages'
      CAPPVERSION: "0.1"

AppImage:
  arch: x86_64
  sign-key: None
  file_name: 'KeychronBatteryWidget.AppImage'
